<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | BCGame</title>
    <style>
      /* This makes the body and canvas fill the entire browser window */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; /* Prevents scrollbars */
        background-color: #231F20;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Removed fixed width/height from the canvas tag -->
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/docs.loader.js"></script>
    <script>
      // Automatically handle mobile viewport scaling
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/docs.data",
        frameworkUrl: "Build/docs.framework.js",
        codeUrl: "Build/docs.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "BCGame",
        productVersion: "0.1.0",
        // This ensures the internal game resolution matches the browser size
        devicePixelRatio: window.devicePixelRatio || 1, 
      }).then((unityInstance) => {
        // Game loaded
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
